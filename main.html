<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- Bootstrap 3.3.6 / 3.4.1 Layout Components -->
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
		<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
	</head>
	<body style="padding: 20px;">

		<button type="button" class="btn btn-danger" data-toggle="modal" data-target="#signupModal">
			Sign Up
		</button>

		<div class="modal fade" id="signupModal" tabindex="-1" role="dialog" aria-labelledby="signupModalLabel">
			<div class="modal-dialog" role="document">
				<div class="modal-content">
					
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
						<h4 class="modal-title" id="signupModalLabel">Create Account</h4>
					</div>
					
					<form>
						<div class="modal-body">
							
							<div class="form-group">
								<label for="inputEmail">Email address</label>
								<input type="email" class="form-control" id="inputEmail" placeholder="Enter email">
								<p class="help-block" style="font-size: 12px; margin-top: 5px;">Your information is safe with us.</p>
							</div>
							
							<div class="form-group">
								<label for="inputPassword">Password</label>
								<input type="password" class="form-control" id="inputPassword" placeholder="Password">
							</div>
							
							<div class="form-group">
								<label for="inputConfirmPassword">Confirm Password</label>
								<input type="password" class="form-control" id="inputConfirmPassword" placeholder="Confirm Password">
							</div>
							
						</div>
						
						<div class="modal-footer">
							<button type="submit" class="btn btn-success">Submit</button>
						</div>
					</form>

				</div>
			</div>
		</div>

	</body>
</html>
